<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | SmartLessa AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #0f0; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Верхня панель */
        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 200;
        }
        .top-bar button {
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border: 2px solid #0f0; color: #0f0; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            font-size: 14px; box-shadow: 0 0 15px rgba(0,255,0,0.2);
        }

        /* Підказки для дитини */
        #ui {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-radius: 25px; padding: 15px; z-index: 100;
            text-align: center; border: 2px solid #0f0;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }
        #status {
            color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 5px;
        }
        #sub-status {
            color: #0f0; font-size: 14px; opacity: 0.9;
        }

        /* Кнопки дій */
        .action-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0f0; color: #000; font-size: 22px; font-weight: bold;
            padding: 20px 40px; border-radius: 60px; border: none; z-index: 300;
            cursor: pointer; box-shadow: 0 0 50px #0f0; display: none;
        }

        /* Екран завантаження */
        #loading, #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top-color: #0f0; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Оверлей для запуску відео (якщо автоплей заблоковано) */
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: #0f0; cursor: pointer;
        }
        .start-pill {
            background: #0f0; color: #000; padding: 20px 40px;
            border-radius: 50px; font-size: 24px; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="loading">
        <div class="spinner"></div>
        <div style="color:#0f0; font-size: 20px;">ГОТУЄМО МАГІЮ AR...</div>
    </div>

    <div id="intro">
        <h1 style="color:#0f0; font-size: 40px; text-shadow: 0 0 20px #0f0;">SMARTLESSA</h1>
        <p style="color:#fff; margin-top: 20px; font-size: 18px;">Твоя цифрова лисичка чекає!</p>
    </div>

    <div class="top-bar">
        <button id="camera-toggle">🔄 Камера</button>
        <button id="reset">⟳ Скинути</button>
    </div>

    <div id="ui">
        <div id="status">👋 Привіт! Покажи долоню</div>
        <div id="sub-status">Лисичка з'явиться прямо на твоїй руці</div>
    </div>

    <button id="play-video" class="action-btn">🎬 Дивитись ще раз</button>
    <button id="task-btn" class="action-btn">🦊 Грати в гру</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        const CONFIG = {
            braceletBaseRadius: 0.19,
            braceletTube: 0.03,
            handOffsetY: 0.02,
            hologramOffsetY: 0.35,
            hologramScale: 1.0,
            posSmoothing: 0.15,
            rotSmoothing: 0.15,
            hideHologramDelay: 2000
        };

        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const subStatus = document.getElementById('sub-status');
        const taskBtn = document.getElementById('task-btn');
        const playVideoBtn = document.getElementById('play-video');

        // Three.js Setup
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 3.5;
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const braceletGroup = new THREE.Group();
        const hologramGroup = new THREE.Group();
        scene.add(braceletGroup, hologramGroup);

        // Візуальний браслет
        const ringGeom = new THREE.TorusGeometry(CONFIG.braceletBaseRadius, CONFIG.braceletTube, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 0.5 });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        braceletGroup.add(ring);
        braceletGroup.add(new THREE.PointLight(0x00ffaa, 1, 2));

        // Відео-голограма
        const holoVideo = document.createElement('video');
        holoVideo.src = 'assets/video/guide_hologram.mp4';
        holoVideo.playsinline = true;
        holoVideo.preload = 'auto';

        const videoTex = new THREE.VideoTexture(holoVideo);
        const holoPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(1, 1),
            new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, side: THREE.DoubleSide })
        );
        holoPlane.position.y = CONFIG.hologramOffsetY;
        hologramGroup.add(holoPlane);

        let handLandmarker, handVisible = false, hologramActive = false, hideTimeout;
        let facingMode = 'environment';

        async function initAR() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            startCamera();
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } });
            videoEl.srcObject = stream;
            videoEl.onloadedmetadata = () => {
                videoEl.play();
                document.getElementById('loading').style.display = 'none';
                setTimeout(() => document.getElementById('intro').style.opacity = '0', 2000);
            };
        }

        function activateLessa() {
            if (hologramActive) return;
            hologramActive = true;
            hologramGroup.visible = true;
            statusDiv.textContent = '✨ СУПЕР! ТИ ЗНАЙШОВ ЛИСИЧКУ! ✨';
            subStatus.textContent = 'Слухай уважно, вона щось розповідає';
            
            holoVideo.currentTime = 0;
            holoVideo.play().catch(showClickOverlay);
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function showClickOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'video-overlay';
            overlay.innerHTML = '<div class="start-pill">ТОРКНИСЬ, ЩОБ ПОЧАТИ</div>';
            overlay.onclick = () => { holoVideo.play(); overlay.remove(); };
            document.body.appendChild(overlay);
        }

        function update() {
            if (handLandmarker && videoEl.readyState >= 2) {
                const results = handLandmarker.detectForVideo(videoEl, performance.now());
                if (results.landmarks && results.landmarks.length > 0) {
                    const pts = results.landmarks[0];
                    const wrist = pts[0];
                    
                    if (!handVisible) {
                        handVisible = true;
                        clearTimeout(hideTimeout);
                        activateLessa();
                    }

                    // Рух браслета за рукою
                    const tx = (wrist.x - 0.5) * 3;
                    const ty = (0.5 - wrist.y) * 2;
                    braceletGroup.position.x += (tx - braceletGroup.position.x) * CONFIG.posSmoothing;
                    braceletGroup.position.y += (ty - braceletGroup.position.y) * CONFIG.posSmoothing;
                    braceletGroup.visible = true;

                    hologramGroup.position.copy(braceletGroup.position);

                    // Нахил браслета
                    const dx = pts[5].x - pts[17].x;
                    const dy = pts[5].y - pts[17].y;
                    braceletGroup.rotation.z = Math.atan2(dy, dx) + Math.PI/2;

                } else if (handVisible) {
                    handVisible = false;
                    braceletGroup.visible = false;
                    statusDiv.textContent = '👋 Де твоя рука?';
                    subStatus.textContent = 'Поверни руку, щоб лисичка не зникла';
                    
                    hideTimeout = setTimeout(() => {
                        if (!handVisible) {
                            hologramActive = false;
                            hologramGroup.visible = false;
                            holoVideo.pause();
                        }
                    }, CONFIG.hideHologramDelay);
                }
            }
            renderer.render(scene, camera3D);
            requestAnimationFrame(update);
        }

        holoVideo.onended = () => {
            taskBtn.style.display = 'block';
            playVideoBtn.style.display = 'block';
            statusDiv.textContent = '🦊 Пограємо?';
        };

        playVideoBtn.onclick = () => {
            holoVideo.currentTime = 0;
            holoVideo.play();
            playVideoBtn.style.display = 'none';
        };

        taskBtn.onclick = () => window.open('https://lessa2332.github.io/animal/', '_blank');

        document.getElementById('camera-toggle').onclick = () => {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        };

        document.getElementById('reset').onclick = () => location.reload();

        initAR();
        update();

        window.onresize = () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
