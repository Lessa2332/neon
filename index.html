<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | PRO</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        :root { --accent: #0f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100%;
            width: 100%;
        }

        /* Адаптація під вирізи (iPhone Safe Areas) */
        #video { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 0; 
            transform: scaleX(-1); 
        }
        
        #canvas { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            pointer-events: none; 
        }
        
        #progress-container { 
            position: absolute; 
            top: env(safe-area-inset-top, 0); 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: rgba(255,255,255,0.1); 
            z-index: 150; 
        }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        #ui { 
            position: absolute; 
            bottom: calc(30px + env(safe-area-inset-bottom, 0)); 
            left: 0; right: 0; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            padding: 0 20px;
        }

        #status {
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            border-radius: 15px;
            color: #fff; 
            font-weight: 600; 
            border: 1px solid var(--accent);
            text-align: center; 
            width: 100%; 
            max-width: 400px;
            font-size: 1rem;
        }

        #mic-btn {
            display: none; width: 70px; height: 70px; background: #ff4444; border-radius: 50%;
            border: 4px solid #fff; cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Екран старту з урахуванням динамічної висоти мобільних */
        #start-screen { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle, #002200 0%, #000 100%); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        
        input { 
            padding: 15px; border-radius: 30px; border: 2px solid var(--accent); 
            background: rgba(0,255,0,0.05); color: var(--accent); 
            text-align: center; margin-bottom: 20px; width: 100%; max-width: 300px; font-size: 1.1rem; outline: none;
        }
        #btn-start { 
            background: var(--accent); color: #000; padding: 15px 40px; 
            border-radius: 30px; font-weight: 800; border: none; cursor: pointer; font-size: 1.2rem; 
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="start-screen">
        <h1 style="color:var(--accent); margin-bottom:10px; letter-spacing: 2px;">SMARTLESSA</h1>
        <p style="color: #fff; margin-bottom: 30px; opacity: 0.8;">Geography AR Quest</p>
        <input type="text" id="user-name" placeholder="Введіть ваше ім'я">
        <button id="btn-start">РОЗПОЧАТИ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Завантаження AI...</div>
        <div id="mic-btn">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');

        let handLandmarker, scene, camera, renderer, ring, braceletGroup, masterGroup, holoPlane, holoVideo, particles;
        let userName = "досліднику";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі об'єднує всі сфери?", a: ["географічна"] },
            { q: "Як називається повітряна оболонка Землі?", a: ["атмосфера"] },
            { q: "Як називається тверда оболонка Землі?", a: ["літосфера"] },
            { q: "Назви водну оболонку нашої планети.", a: ["гідросфера"] },
            { q: "Як називається жива оболонка планети?", a: ["біосфера"] }
        ];

        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", 
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                statusDiv.innerText = "Система готова! Покажи кулак ✊";
            } catch (e) {
                statusDiv.innerText = "Помилка завантаження AI";
                console.error(e);
            }
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Обмеження для продуктивності
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);
            
            braceletGroup = new THREE.Group();
            masterGroup.add(braceletGroup);

            ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.25, 0.015, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2.5 })
            );
            braceletGroup.add(ring);

            // Світло
            const light = new THREE.PointLight(0xffffff, 1);
            scene.add(light);

            // Голограма (спрощений шейдер для мобільних)
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4'; 
            holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;
            
            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.0), holoMat);
            holoPlane.position.set(0, 0.6, 0);
            holoPlane.visible = false;
            masterGroup.add(holoPlane);

            // Частинки
            const pGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(150 * 3);
            for(let i=0; i<450; i++) pos[i] = (Math.random()-0.5)*2;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ff00, size: 0.03 }));
            particles.visible = false;
            masterGroup.add(particles);

            camera.position.z = 3;
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 1.0;
            utterance.onend = () => { isSpeaking = false; onEnd(); };
            isSpeaking = true;
            window.speechSynthesis.speak(utterance);
        }

        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            isWaitingForGesture = false;
            holoPlane.visible = true;
            holoVideo.play().catch(() => {});
            
            const percent = (currentIdx / questions.length) * 100;
            progressBar.style.width = percent + "%";
            
            speak(questions[currentIdx].q, () => {
                micBtn.style.display = "flex";
                statusDiv.innerText = "🎤 Говоріть...";
            });
        }

        micBtn.onclick = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Ваш браузер не підтримує розпізнавання голосу");
                return;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'uk-UA';
            rec.onstart = () => micBtn.style.background = "#00ff00";
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));
                micBtn.style.display = "none";
                micBtn.style.background = "#ff4444";

                if (isCorrect) {
                    score++;
                    ring.material.emissive.setHex(0x00ff00);
                    speak("Правильно!");
                } else {
                    ring.material.emissive.setHex(0xff0000);
                    speak(`Ні, це ${questions[currentIdx].a[0]}`);
                }

                setTimeout(() => {
                    ring.material.emissive.setHex(0x00ffaa);
                    currentIdx++;
                    if (currentIdx < questions.length) triggerQuestion();
                    else finishLesson();
                }, 2000);
            };
            rec.start();
        };

        function finishLesson() {
            progressBar.style.width = "100%";
            particles.visible = true;
            speak(`Квест завершено! ${userName}, результат: ${score}/5.`, () => {
                setTimeout(() => location.reload(), 6000);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const wrist = res.landmarks[0][0];
                    // Інверсія X: wrist.x від 0 до 1. (0.5 - wrist.x) * множник
                    masterGroup.position.x = (wrist.x - 0.5) * 4; 
                    masterGroup.position.y = (0.5 - wrist.y) * 3;
                    masterGroup.visible = true;
                    
                    // Жест розгортання долоні (якщо кінчик пальця вище ніж суглоб)
                    if (isWaitingForGesture && res.landmarks[0][8].y < res.landmarks[0][6].y) {
                        triggerQuestion();
                    }
                } else {
                    masterGroup.visible = false;
                }
            }
            if (braceletGroup) braceletGroup.rotation.z += 0.02;
            if (particles && particles.visible) {
                particles.rotation.y += 0.02;
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('start-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
                });
                video.srcObject = stream;
                setupScene();
                await initAI();
                speak(`Привіт, ${userName}! Покажи долоню, щоб почати!`);
            } catch (err) {
                alert("Потрібен доступ до камери");
            }
        };
    </script>
</body>
</html>
