<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA | AI-Асистент</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; color: #0f0; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Вікно знайомства */
        #name-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #name-modal h2 { font-size: 1.8rem; color: #0f0; margin-bottom: 25px; text-shadow: 0 0 15px #0f0; }
        #user-name {
            padding: 15px; border-radius: 50px; border: 2px solid #0f0;
            background: transparent; color: #0f0; font-size: 1.2rem;
            text-align: center; width: 80%; max-width: 300px; margin-bottom: 25px; outline: none;
        }
        #start-btn {
            background: #0f0; color: black; padding: 15px 45px;
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            font-size: 1.1rem; box-shadow: 0 0 20px #0f0;
        }

        .top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 200;
        }
        .top-bar button {
            background: rgba(0,0,0,0.7); border: 2px solid #0f0; color: #0f0;
            padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px;
        }
        #ui {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; z-index: 100;
            text-align: center; border: 1px solid #0f0;
        }
        #status { color: #ffdd88; font-weight: bold; margin-bottom: 5px; }
        .gesture-hint {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            color: #afa; font-size: 13px; background: rgba(0,0,0,0.5);
            padding: 5px 15px; border-radius: 40px; z-index: 100;
        }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 3000;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div><p>Ініціалізація AI...</p></div>

    <div id="name-modal">
        <h2>🦊 Я СМАРТЛЕССА.<br>ЯК ТЕБЕ ЗВАТИ?</h2>
        <input type="text" id="user-name" placeholder="Введи своє ім'я..." autocomplete="off">
        <button id="start-btn">ПОЧАТИ УРОК</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="top-bar">
        <button id="camera-toggle">🔄 КАМЕРА</button>
        <button id="reset-btn">⟳ СКИНУТИ</button>
    </div>

    <div id="ui">
        <div id="status">👋 Чекаю на твою руку...</div>
        <div id="sub-status">Торкнися майбутнього</div>
    </div>
    
    <div class="gesture-hint" id="gestureHint">🤜 Стисни кулак, щоб покликати мене</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        // КОНФІГУРАЦІЯ
        const CONFIG = {
            braceletRadius: 0.2,
            hologramY: 0.35,
            smoothing: 0.15,
            fistThreshold: 65,
            hologramScale: 0.95
        };

        let userName = "друже";
        let handLandmarker;
        let handVisible = false;
        let hologramActive = false;
        const synth = window.speechSynthesis;

        // THREE.JS SCENE
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 3;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);

        const holoGroup = new THREE.Group();
        scene.add(holoGroup);
        holoGroup.visible = false;

        // БРАСЛЕТ (НЕОНОВЕ КІЛЬЦЕ)
        const ringGeom = new THREE.TorusGeometry(CONFIG.braceletRadius, 0.02, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 1 });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        braceletGroup.add(ring);
        braceletGroup.add(new THREE.PointLight(0x00ffaa, 2, 2));

        // ВІДЕО-ГОЛОГРАМА (БЕЗ ЗВУКУ ДЛЯ СТАБІЛЬНОСТІ)
        const holoVideo = document.createElement('video');
        holoVideo.src = 'assets/video/guide_hologram.mp4'; // Шлях до вашого відео
        holoVideo.loop = true;
        holoVideo.muted = true; 
        holoVideo.playsInline = true;

        const videoTex = new THREE.VideoTexture(holoVideo);
        const holoMat = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTex }, uTime: { value: 0 } },
            transparent: true,
            side: THREE.DoubleSide,
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D uVideo;
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    vec4 color = texture2D(uVideo, vUv);
                    float greenness = color.g - (color.r + color.b) * 0.5;
                    if (greenness > 0.25) discard; // Хромакей
                    float scan = sin(vUv.y * 100.0 + uTime * 10.0) * 0.1;
                    gl_FragColor = vec4(color.rgb + scan, 0.85);
                }
            `
        });

        const holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), holoMat);
        holoPlane.position.y = CONFIG.hologramY;
        holoGroup.add(holoPlane);

        // ГОЛОСОВА ФУНКЦІЯ
        function speak(text) {
            synth.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'uk-UA';
            speech.pitch = 1.2;
            speech.rate = 1.0;
            synth.speak(speech);
        }

        // ПЕРЕВІРКА КУЛАКА
        function isFist(lm) {
            const fingers = [[8,6,5], [12,10,9], [16,14,13], [20,18,17]];
            let closed = 0;
            fingers.forEach(([t, p, m]) => {
                const angle = Math.acos((lm[p].y - lm[m].y) / Math.hypot(lm[p].x-lm[m].x, lm[p].y-lm[m].y)) * 180 / Math.PI;
                if (lm[t].y > lm[p].y) closed++;
            });
            return closed >= 3;
        }

        // АКТИВАЦІЯ
        function activate() {
            if (hologramActive) return;
            hologramActive = true;
            holoGroup.visible = true;
            holoVideo.play();
            
            const greetings = [
                `Привіт, ${userName}! Я рада тебе бачити. Давай вивчати географію разом!`,
                `Вітаю, ${userName}! Ти активував мій секретний браслет.`,
                `Ого, ${userName}! Ти виглядаєш як справжній дослідник.`
            ];
            speak(greetings[Math.floor(Math.random() * greetings.length)]);
            
            document.getElementById('status').textContent = `🦊 Привіт, ${userName}!`;
            document.getElementById('gestureHint').style.opacity = '0';
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        // МЕДІАПАЙП ТА КАМЕРА
        async function start() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const v = document.getElementById('video');
            v.srcObject = stream;
            
            document.getElementById('loading').style.display = 'none';
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const v = document.getElementById('video');
            
            if (handLandmarker && v.readyState >= 2) {
                const res = handLandmarker.detectForVideo(v, now);
                if (res.landmarks && res.landmarks[0]) {
                    const lm = res.landmarks[0];
                    const wrist = lm[0];
                    
                    // Плавне слідування за рукою
                    const tx = (wrist.x - 0.5) * 3;
                    const ty = (0.5 - wrist.y) * 2;
                    braceletGroup.position.x += (tx - braceletGroup.position.x) * CONFIG.smoothing;
                    braceletGroup.position.y += (ty - braceletGroup.position.y) * CONFIG.smoothing;
                    braceletGroup.visible = true;
                    
                    holoGroup.position.copy(braceletGroup.position);
                    
                    if (isFist(lm)) activate();
                } else {
                    braceletGroup.visible = false;
                }
            }
            
            holoMat.uniforms.uTime.value = now / 1000;
            ring.rotation.y += 0.02;
            renderer.render(scene, camera3D);
        }

        // ПЕРШИЙ КЛІК - ЗАПУСК
        document.getElementById('start-btn').onclick = () => {
            const val = document.getElementById('user-name').value;
            if (val) userName = val;
            document.getElementById('name-modal').style.opacity = '0';
            setTimeout(() => document.getElementById('name-modal').style.display = 'none', 500);
            start();
        };

        document.getElementById('reset-btn').onclick = () => location.reload();
        
    </script>
</body>
</html>
