<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>НЕОН-БРАСЛЕТ | AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .top-bar {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 200;
            gap: 12px; flex-wrap: wrap;
        }
        .top-bar button {
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            border: 2px solid #0f0; color: #0f0; padding: 8px 16px;
            border-radius: 40px; font-weight: bold; font-family: monospace;
            cursor: pointer; font-size: 14px;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 10px; z-index: 100;
            color: #0f0; text-align: center; font-size: 14px;
            border: 1px solid #0f0;
        }
        #status { color: #ffdd88; margin-bottom: 5px; }
        #play-video, #start-hologram-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #0f0, #0a0); color: black;
            font-size: 22px; font-weight: bold; padding: 16px 32px;
            border-radius: 60px; border: none; z-index: 300;
            cursor: pointer; box-shadow: 0 0 40px #0f0;
            font-family: monospace; white-space: nowrap;
            display: none;
        }
        #task-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(45deg, #0f0, #0a0); color: black;
            font-size: 24px; font-weight: bold; padding: 14px 28px;
            border-radius: 60px; border: none; z-index: 300;
            display: none; cursor: pointer; box-shadow: 0 0 30px #0f0;
            font-family: monospace;
        }
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            color: #0f0; font-size: 1.2rem;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .top-bar button { padding: 6px 12px; font-size: 12px; }
            #play-video, #start-hologram-btn, #task-btn { font-size: 18px; padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="loading">
        <div class="spinner"></div>
        <div>ЗАВАНТАЖЕННЯ AR...</div>
    </div>
    <div class="top-bar">
        <button id="camera-toggle">📷 Змінити камеру</button>
        <button id="reset">⟳ Скинути</button>
    </div>
    <div id="ui">
        <div id="status">👋 Покажіть долоню</div>
        <div>✊ Стисніть кулак → голограма</div>
    </div>
    <button id="start-hologram-btn">▶ Запустити голограму</button>
    <button id="play-video">🎬 Повторити відео</button>
    <button id="task-btn">📜 ЗАВДАННЯ → Telegram</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        const CONFIG = {
            braceletBaseRadius: 0.19,
            braceletTube: 0.032,
            handOffsetY: 0.015,
            hologramOffsetY: 0.32,
            hologramScale: 0.95,
            rotationSpeed: 0.0012,
            glowIdle: 0.35,
            glowActive: 1.4,
            rotSmoothing: 0.18,
            posSmoothing: 0.14,
            fistAngleThreshold: 68
        };

        const videoEl = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loadingDiv = document.getElementById('loading');
        const statusDiv = document.getElementById('status');
        const resetBtn = document.getElementById('reset');
        const cameraToggleBtn = document.getElementById('camera-toggle');
        const startHologramBtn = document.getElementById('start-hologram-btn');
        const playVideoBtn = document.getElementById('play-video');
        const taskBtn = document.getElementById('task-btn');

        // Three.js setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.2);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);

        const hologramWorldGroup = new THREE.Group();
        scene.add(hologramWorldGroup);

        // === ПОКРАЩЕНИЙ БРАСЛЕТ ===
        const innerRingGeo = new THREE.TorusGeometry(CONFIG.braceletBaseRadius, CONFIG.braceletTube, 64, 80, Math.PI * 0.78);
        const innerRingMat = new THREE.MeshStandardMaterial({
            color: 0x00ff99,
            emissive: 0x22ff99,
            emissiveIntensity: CONFIG.glowIdle,
            metalness: 0.9,
            roughness: 0.2,
            transparent: true,
            opacity: 0.97,
            depthWrite: false
        });
        const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
        braceletGroup.add(innerRing);

        const outerRingGeo = new THREE.TorusGeometry(CONFIG.braceletBaseRadius + 0.012, 0.006, 64, 80, Math.PI * 0.78);
        const outerRingMat = new THREE.MeshStandardMaterial({
            color: 0x88ffcc,
            emissive: 0x88ffcc,
            emissiveIntensity: 0.7,
            transparent: true,
            opacity: 0.85,
            depthWrite: false
        });
        const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
        braceletGroup.add(outerRing);

        const pointLight = new THREE.PointLight(0x44ffaa, CONFIG.glowIdle, 3);
        braceletGroup.add(pointLight);

        // === ГОЛОГРАМА ===
        const hologramVideo = document.createElement('video');
        hologramVideo.playsinline = true;
        hologramVideo.muted = false;
        hologramVideo.loop = false;
        hologramVideo.src = 'assets/video/guide_hologram.mp4'; // ← заміни на свій шлях

        const videoTexture = new THREE.VideoTexture(hologramVideo);
        videoTexture.minFilter = THREE.LinearFilter;

        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            uniform float uTime;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vec3 pos = position;
                pos.x += sin(uTime * 25.0 + position.y * 15.0) * 0.0035;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D uVideo;
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vNormal;

            void main() {
                vec4 color = texture2D(uVideo, vUv);
                float greenness = color.g - (color.r + color.b) * 0.48;
                if (greenness > 0.32) discard;

                float fresnel = pow(1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.8);
                float scanline = sin(vUv.y * 920.0 + uTime * 28.0) * 0.13;
                float noise = fract(sin(dot(vUv * 14.0, vec2(12.9898, 78.233))) * 43758.5453 + uTime * 12.0);

                vec3 holo = mix(color.rgb * 0.9, vec3(0.15, 1.0, 0.35), 0.6);
                holo += vec3(0.0, 1.1, 0.5) * fresnel * 2.2;
                holo += scanline + noise * 0.18;
                holo *= 0.92 + sin(uTime * 14.0) * 0.08;

                float alpha = 0.88 + fresnel * 0.45;
                gl_FragColor = vec4(holo, alpha);
            }
        `;

        const hologramMaterial = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTexture }, uTime: { value: 0 } },
            vertexShader, fragmentShader,
            transparent: true, side: THREE.DoubleSide, depthWrite: false
        });

        const hologramPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), hologramMaterial);
        hologramPlane.position.y = CONFIG.hologramOffsetY;
        hologramWorldGroup.add(hologramPlane);

        hologramVideo.addEventListener('loadedmetadata', () => {
            const aspect = hologramVideo.videoWidth / hologramVideo.videoHeight;
            hologramPlane.scale.set(CONFIG.hologramScale, CONFIG.hologramScale / aspect, 1);
        });

        // Частинки
        const particlesGroup = new THREE.Group();
        hologramWorldGroup.add(particlesGroup);
        for (let i = 0; i < 16; i++) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.007, 5, 5),
                new THREE.MeshStandardMaterial({ color: 0x44ff88, emissive: 0x88ffaa, emissiveIntensity: 0.6 })
            );
            p.userData = { angle: i / 16 * Math.PI * 2, radius: 0.68, speed: 0.4 + Math.random() * 0.6 };
            particlesGroup.add(p);
        }

        // Стани
        let videoPlayed = false;
        let taskButtonShown = false;
        let handLandmarker = null;
        let handVisible = false;
        let hologramActive = false;
        let fistState = false;
        let lastFistState = false;
        let currentFacingMode = 'environment';

        let currentRotX = 0, currentRotZ = 0;
        let lastDetectionTime = 0;
        const DETECTION_INTERVAL = 1000 / 28;

        function getFingerCurlAngle(lm, tip, pip, mcp) {
            const v1 = { x: lm[pip].x - lm[mcp].x, y: lm[pip].y - lm[mcp].y, z: (lm[pip].z||0) - (lm[mcp].z||0) };
            const v2 = { x: lm[tip].x - lm[pip].x, y: lm[tip].y - lm[pip].y, z: (lm[tip].z||0) - (lm[pip].z||0) };
            const dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
            const len1 = Math.hypot(v1.x, v1.y, v1.z) || 1;
            const len2 = Math.hypot(v2.x, v2.y, v2.z) || 1;
            return Math.acos(Math.max(-1, Math.min(1, dot/(len1*len2)))) * (180 / Math.PI);
        }

        function isFist(lm) {
            const fingers = [[8,6,5], [12,10,9], [16,14,13], [20,18,17]];
            let closed = 0;
            for (let [tip, pip, mcp] of fingers) {
                if (getFingerCurlAngle(lm, tip, pip, mcp) < CONFIG.fistAngleThreshold) closed++;
            }
            return closed >= 3;
        }

        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
        }

        async function startCamera() {
            try {
                if (videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t => t.stop());
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                videoEl.srcObject = stream;
                await videoEl.play();
                return true;
            } catch(e) {
                statusDiv.innerHTML = '❌ Помилка доступу до камери';
                return false;
            }
        }

        function processHandResults(results) {
            if (results.landmarks && results.landmarks.length > 0) {
                const lm = results.landmarks[0];
                if (!handVisible) {
                    handVisible = true;
                    statusDiv.innerHTML = '🖐️ Рука виявлена!';
                }

                // Центр зап'ястя + покращена позиція
                const wrist = lm[0];
                const palmCenter = {
                    x: (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5,
                    y: (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5,
                    z: ((lm[0].z||0) + (lm[5].z||0) + (lm[9].z||0) + (lm[13].z||0) + (lm[17].z||0)) / 5
                };

                const targetX = (wrist.x - 0.5) * 2.8;
                const targetY = (0.5 - wrist.y) * 2.1 + CONFIG.handOffsetY;
                const targetZ = (wrist.z || 0) * 0.65 + 0.09;

                braceletGroup.position.x += (targetX - braceletGroup.position.x) * CONFIG.posSmoothing;
                braceletGroup.position.y += (targetY - braceletGroup.position.y) * CONFIG.posSmoothing;
                braceletGroup.position.z = targetZ;

                hologramWorldGroup.position.copy(braceletGroup.position);
                hologramWorldGroup.position.y += CONFIG.hologramOffsetY;

                // Масштаб
                const wristWidth = Math.hypot(lm[0].x - lm[17].x, lm[0].y - lm[17].y, (lm[0].z||0) - (lm[17].z||0)) * 5.8;
                const scale = Math.max(0.75, Math.min(1.55, wristWidth / CONFIG.braceletBaseRadius));
                innerRing.scale.set(scale, scale, scale);
                outerRing.scale.set(scale, scale, scale);

                // Ротація
                const dx = lm[5].x - lm[17].x;
                const dy = lm[5].y - lm[17].y;
                const dz = (lm[5].z||0) - (lm[17].z||0);
                const rotZ = Math.atan2(dy, dx) + Math.PI/2;
                const rotX = Math.atan2(dz, Math.hypot(dx, dy)) * 0.6;

                currentRotX += (rotX - currentRotX) * CONFIG.rotSmoothing;
                currentRotZ += (rotZ - currentRotZ) * CONFIG.rotSmoothing;

                braceletGroup.rotation.set(currentRotX, 0, currentRotZ);

                // Жест кулака
                fistState = isFist(lm);

                if (fistState && !lastFistState && !hologramActive) {
                    hologramActive = true;
                    hologramWorldGroup.visible = true;
                    statusDiv.innerHTML += ' | ✨ Готово до голограми!';
                    startHologramBtn.style.display = 'block';
                    if (navigator.vibrate) navigator.vibrate(80);
                }
                lastFistState = fistState;
                braceletGroup.visible = true;
            } else {
                if (handVisible) {
                    handVisible = false;
                    statusDiv.innerHTML = '👋 Покажіть руку знову';
                    braceletGroup.visible = false;
                    hologramWorldGroup.visible = false;
                    hologramActive = false;
                    lastFistState = false;
                    startHologramBtn.style.display = 'none';
                }
            }
        }

        function detectionLoop() {
            const now = performance.now();
            if (now - lastDetectionTime > DETECTION_INTERVAL && handLandmarker && videoEl.readyState >= 2) {
                const results = handLandmarker.detectForVideo(videoEl, now);
                processHandResults(results);
                lastDetectionTime = now;
            }
            requestAnimationFrame(detectionLoop);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() / 1000;

            if (braceletGroup.visible) {
                innerRing.rotation.y += CONFIG.rotationSpeed;
                outerRing.rotation.y -= CONFIG.rotationSpeed * 0.75;
                const targetGlow = hologramActive ? CONFIG.glowActive : CONFIG.glowIdle;
                innerRingMat.emissiveIntensity += (targetGlow - innerRingMat.emissiveIntensity) * 0.1;
                pointLight.intensity = innerRingMat.emissiveIntensity * 0.95;
            }

            if (hologramWorldGroup.visible && hologramMaterial.uniforms) {
                hologramMaterial.uniforms.uTime.value = t;
                if (!hologramVideo.paused) videoTexture.needsUpdate = true;

                particlesGroup.children.forEach(p => {
                    const a = t * p.userData.speed + p.userData.angle;
                    p.position.x = Math.cos(a) * p.userData.radius;
                    p.position.z = Math.sin(a) * p.userData.radius;
                    p.position.y = Math.sin(a * 2.5) * 0.06;
                });
            }

            renderer.render(scene, camera);
        }

        // Кнопки
        startHologramBtn.onclick = () => {
            if (!videoPlayed) {
                hologramVideo.play().then(() => {
                    videoPlayed = true;
                    startHologramBtn.style.display = 'none';
                    playVideoBtn.style.display = 'none';
                }).catch(() => {
                    startHologramBtn.innerHTML = '❌ Спробуйте ще раз';
                });
            }
        };

        playVideoBtn.onclick = () => {
            if (videoPlayed) {
                hologramVideo.currentTime = 0;
                hologramVideo.play();
            }
        };

        hologramVideo.addEventListener('ended', () => {
            taskBtn.style.display = 'block';
        });

        taskBtn.onclick = () => window.open('https://t.me/lessa2332', '_blank');

        cameraToggleBtn.onclick = async () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            await startCamera();
        };

        resetBtn.onclick = () => {
            hologramVideo.pause();
            hologramVideo.currentTime = 0;
            videoPlayed = false;
            hologramActive = false;
            hologramWorldGroup.visible = false;
            startHologramBtn.style.display = 'none';
            playVideoBtn.style.display = 'none';
            taskBtn.style.display = 'none';
            statusDiv.innerHTML = '👋 Скинуто. Покажіть руку';
        };

        async function init() {
            await initMediaPipe();
            await startCamera();
            braceletGroup.visible = false;
            hologramWorldGroup.visible = false;
            animate();
            detectionLoop();
            loadingDiv.style.display = 'none';
        }

        init().catch(console.error);
    </script>
</body>
</html>
