<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA | NEON AR</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; color: #0f0; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        #loading { position: fixed; inset: 0; background: black; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #start-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        #user-name {
            padding: 15px; border-radius: 50px; border: 2px solid #0f0;
            background: transparent; color: #0f0; font-size: 1.2rem;
            text-align: center; width: 80%; max-width: 300px; margin-bottom: 20px; outline: none;
        }
        #btn-start {
            background: #0f0; color: black; padding: 15px 40px;
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 0 20px #0f0;
        }
        #status { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; color: #ffdd88; font-weight: bold; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="loading">⌛ Завантаження ШІ...</div>

    <div id="start-screen" style="display:none;">
        <h2 style="color:#0f0; margin-bottom:20px;">🦊 Я СМАРТЛЕССА</h2>
        <input type="text" id="user-name" placeholder="Твоє ім'я..." autocomplete="off">
        <button id="btn-start">ПОЧАТИ УРОК</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="status">Покажи долоню</div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        let handLandmarker;
        let userName = "досліднику";
        let hologramActive = false;

        // Звукове вітання
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            window.speechSynthesis.speak(utterance);
        }

        // 1. Ініціалізація MediaPipe
        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            } catch (e) {
                document.getElementById('loading').innerText = "Помилка мережі. Спробуй VPN або Chrome.";
            }
        }

        // 2. Three.js Сцена
        let scene, camera, renderer, braceletGroup, holoPlane, holoVideo;

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            braceletGroup = new THREE.Group();
            scene.add(braceletGroup);

            // Неонове кільце
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.2, 0.015, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2 })
            );
            braceletGroup.add(ring);
            
            const light = new THREE.PointLight(0x00ffaa, 2, 3);
            braceletGroup.add(light);

            // Відео-лисичка
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4';
            holoVideo.loop = true; holoVideo.muted = true; holoVideo.playsInline = true;
            holoVideo.crossOrigin = "anonymous";

            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0.9 });
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), holoMat);
            holoPlane.position.y = 0.5;
            holoPlane.visible = false;
            braceletGroup.add(holoPlane);

            camera.position.z = 3;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks && res.landmarks[0]) {
                    const wrist = res.landmarks[0][0];
                    // Дзеркальне відображення для фронталки
                    braceletGroup.position.x = (0.5 - wrist.x) * 3.5;
                    braceletGroup.position.y = (0.5 - wrist.y) * 2.5;
                    braceletGroup.visible = true;

                    // Логіка кулака (лисичка з'являється)
                    const lm = res.landmarks[0];
                    const isFist = lm[8].y > lm[6].y && lm[12].y > lm[10].y;
                    
                    if (isFist && !hologramActive) {
                        hologramActive = true;
                        holoPlane.visible = true;
                        holoVideo.play();
                        statusDiv.innerText = `🦊 Привіт, ${userName}!`;
                        speak(`Привіт, ${userName}! Я твоя цифрова лисичка.`);
                    }
                } else {
                    braceletGroup.visible = false;
                }
            }
            if (braceletGroup) braceletGroup.rotation.z += 0.01;
            renderer.render(scene, camera);
        }

        // Кнопка старту
        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('start-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.play();
                setupScene();
            } catch (e) {
                alert("Камера заблокована браузером");
            }
        };

        initAI();
    </script>
</body>
</html>
