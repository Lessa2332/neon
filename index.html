<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | ULTRA STABLE</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(255,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 15px #0f0; transition: width 0.5s ease; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #status { background: rgba(0, 0, 0, 0.85); padding: 18px 25px; border-radius: 25px; color: #fff; font-weight: bold; border: 2px solid #0f0; text-align: center; width: 90%; max-width: 500px; font-size: 1.2rem; }
        #mic-btn { display: none; width: 85px; height: 85px; background: #ff4444; border-radius: 50%; border: 4px solid #fff; cursor: pointer; align-items: center; justify-content: center; }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #002211 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        #btn-start { background: #0f0; color: #000; padding: 20px 60px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="start-screen">
        <h1 style="color:#0f0; font-size: 3rem; margin-bottom: 30px;">SMARTLESSA</h1>
        <button id="btn-start">РОЗПОЧАТИ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Натисніть СТАРТ</div>
        <div id="mic-btn">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');
        const audioPlayer = new Audio();

        let handLandmarker, scene, camera, renderer, masterGroup, holoPlane, holoVideo;
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі об'єднує всі інші сфери?", a: ["географічна"] },
            { q: "Як називається повітряна оболонка Землі?", a: ["атмосфера"] },
            { q: "Як називається тверда оболонка Землі?", a: ["літосфера"] },
            { q: "Назви водну оболонку нашої планети.", a: ["гідросфера"] },
            { q: "Як називається жива оболонка планети?", a: ["біосфера"] }
        ];

        // ФУНКЦІЯ ГАРАНТОВАНОГО ГОЛОСУ ЧЕРЕЗ ВІДКРИТИЙ API
        async function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            isSpeaking = true;

            // Використовуємо альтернативний проксі для TTS, який рідко блокується
            const voiceUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=uk&client=tw-ob&q=${encodeURIComponent(text)}`;
            
            audioPlayer.src = voiceUrl;
            audioPlayer.onended = () => {
                isSpeaking = false;
                onEnd();
            };
            
            try {
                await audioPlayer.play();
            } catch (e) {
                console.warn("Автоплей заблоковано, спроба через системний TTS");
                // Спроба через системний голос як останній шанс
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'uk-UA';
                ut.onend = () => { isSpeaking = false; onEnd(); };
                window.speechSynthesis.speak(ut);
            }
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            statusDiv.innerText = "Система готова! Покажи кулак ✊";
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4'; 
            holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;
            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0.8 });
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.1), holoMat);
            holoPlane.position.set(0, 0.6, 0);
            holoPlane.visible = false;
            masterGroup.add(holoPlane);

            camera.position.z = 3.5;
            animate();
        }

        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            isWaitingForGesture = false;
            holoPlane.visible = true;
            holoVideo.play();
            progressBar.style.width = ((currentIdx) / questions.length * 100) + "%";
            
            speak(questions[currentIdx].q, () => {
                holoVideo.pause();
                micBtn.style.display = "flex";
                statusDiv.innerText = "🎤 Говори...";
            });
        }

        micBtn.onclick = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Використовуйте Chrome для розпізнавання голосу");
                return;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'uk-UA';
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));
                micBtn.style.display = "none";
                if (isCorrect) { score++; speak("Правильно!", next); }
                else { speak(`Це ${questions[currentIdx].a[0]}`, next); }
                function next() {
                    currentIdx++;
                    if (currentIdx < questions.length) triggerQuestion();
                    else speak(`Кінець! Твій результат ${score} з 5.`);
                }
            };
            rec.start();
        };

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const wrist = res.landmarks[0][0];
                    masterGroup.position.x = (0.5 - wrist.x) * 3.5;
                    masterGroup.position.y = (0.5 - wrist.y) * 2.5;
                    masterGroup.visible = true;
                    if (isWaitingForGesture && res.landmarks[0][8].y > res.landmarks[0][6].y) triggerQuestion();
                } else { masterGroup.visible = false; }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            // РОЗБЛОКУВАННЯ АУДІО: важливо для браузера
            audioPlayer.play().catch(() => {}); 
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            document.getElementById('start-screen').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            setupScene();
            await initAI();
            speak("Привіт! Покажи кулак!");
        };
    </script>
</body>
</html>
