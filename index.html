<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SMARTLESSA AR</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #0f0; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #debug { position: fixed; top: 10px; left: 10px; color: #f00; font-size: 12px; z-index: 2000; background: rgba(0,0,0,0.5); }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 15px 30px; background: #0f0; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="debug"></div>
    <div id="loading">⌛ Завантаження бібліотек...</div>

    <div id="start-screen" style="display:none;">
        <h2 style="margin-bottom:20px;">🦊 SMARTLESSA AR</h2>
        <button id="btn-start">УВІЙТИ В AR</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        const debug = (msg) => { document.getElementById('debug').innerHTML += msg + "<br>"; };
        const loading = document.getElementById('loading');

        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        let handLandmarker;
        let video = document.getElementById('video');

        async function init() {
            try {
                loading.innerText = "Завантаження моделей AI...";
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                loading.style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
                debug("Система готова!");
            } catch (e) {
                loading.innerText = "Помилка завантаження бібліотек!";
                debug("ERROR: " + e.message);
            }
        }

        document.getElementById('btn-start').onclick = async () => {
            document.getElementById('start-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.play();
                startThree();
            } catch (e) {
                debug("Камера недоступна: " + e.message);
            }
        };

        // ТИМЧАСОВА ПРОСТА ГРАФІКА ДЛЯ ПЕРЕВІРКИ
        function startThree() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            const geo = new THREE.IcosahedronGeometry(0.2, 1);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, wireframe: true });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            camera.position.z = 2;

            function animate() {
                requestAnimationFrame(animate);
                if (handLandmarker && video.readyState >= 2) {
                    const res = handLandmarker.detectForVideo(video, performance.now());
                    if (res.landmarks && res.landmarks[0]) {
                        const wrist = res.landmarks[0][0];
                        mesh.position.x = (0.5 - wrist.x) * 3;
                        mesh.position.y = (0.5 - wrist.y) * 2;
                        mesh.visible = true;
                    } else {
                        mesh.visible = false;
                    }
                }
                mesh.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        init();
    </script>
</body>
</html>
