<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA | GEOGRAPHY AR</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; color: #0f0; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #ui { position: absolute; bottom: 30px; left: 15px; right: 15px; z-index: 100; text-align: center; }
        #status { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; color: #ffdd88; font-weight: bold; border: 1px solid #0f0; }
        #loading { position: fixed; inset: 0; background: black; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        input { padding: 15px; border-radius: 50px; border: 2px solid #0f0; background: transparent; color: #0f0; text-align: center; margin-bottom: 20px; outline: none; }
        button { background: #0f0; color: black; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>

    <div id="loading">⌛ Завантаження географічних моделей...</div>

    <div id="start-screen" style="display:none;">
        <h2 style="color:#0f0; margin-bottom:20px;">🦊 Я СМАРТЛЕССА</h2>
        <input type="text" id="user-name" placeholder="Твоє ім'я...">
        <button id="btn-start">ПОЧАТИ УРОК</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Покажи кулак, щоб почати</div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        let handLandmarker;
        let userName = "досліднику";
        let hologramActive = false;
        let score = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            window.speechSynthesis.speak(utterance);
        }

        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                document.getElementById('loading').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            } catch (e) { alert("Помилка завантаження. Перевір інтернет."); }
        }

        let scene, camera, renderer, braceletGroup, holoPlane, holoVideo;

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            braceletGroup = new THREE.Group();
            scene.add(braceletGroup);

            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.22, 0.01, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2 })
            );
            braceletGroup.add(ring);
            braceletGroup.add(new THREE.PointLight(0x00ffaa, 2, 3));

            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4';
            holoVideo.loop = true; holoVideo.muted = true; holoVideo.playsInline = true;
            holoVideo.crossOrigin = "anonymous";

            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.MeshBasicMaterial({ map: videoTex, transparent: true, opacity: 0.9 });
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), holoMat);
            holoPlane.position.y = 0.5;
            holoPlane.visible = false;
            braceletGroup.add(holoPlane);

            camera.position.z = 3;
            animate();
        }

        async function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            const recognition = new SpeechRecognition();
            recognition.lang = 'uk-UA';
            
            recognition.onstart = () => {
                statusDiv.innerText = "🎤 Слухаю відповідь...";
                statusDiv.style.borderColor = "#ff0000";
            };

            recognition.onresult = (event) => {
                const result = event.results[0][0].transcript.toLowerCase();
                if (result.includes("географічна") && result.includes("оболонка")) {
                    score++;
                    statusDiv.innerText = `⭐ ПРАВИЛЬНО! Балів: ${score}`;
                    statusDiv.style.borderColor = "#0f0";
                    speak("Блискуче, " + userName + "! Це правильна відповідь. Географічна оболонка — найбільший комплекс Землі.");
                } else {
                    speak("Майже! Підказка: це оболонка, де ми всі живемо. Спробуй ще раз.");
                }
            };

            recognition.onend = () => { isListening = false; statusDiv.style.borderColor = "#0f0"; };
            recognition.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks && res.landmarks[0]) {
                    const wrist = res.landmarks[0][0];
                    braceletGroup.position.x = (0.5 - wrist.x) * 3.5;
                    braceletGroup.position.y = (0.5 - wrist.y) * 2.5;
                    braceletGroup.visible = true;

                    const lm = res.landmarks[0];
                    if (lm[8].y > lm[6].y && lm[12].y > lm[10].y && !hologramActive) {
                        hologramActive = true;
                        holoPlane.visible = true;
                        holoVideo.play();
                        speak("Привіт, " + userName + "! Давай перевіримо твої знання. Як називається найбільший природний комплекс планети Земля?");
                        setTimeout(startListening, 7000);
                    }
                } else { braceletGroup.visible = false; }
            }
            if (braceletGroup) braceletGroup.rotation.z += 0.01;
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('start-screen').style.display = 'none';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            video.play();
            setupScene();
        };

        initAI();
    </script>
</body>
</html>
