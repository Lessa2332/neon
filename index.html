<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTLESSA FIX</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 0; }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #status { 
            background: rgba(0,0,0,0.8); color: #0f0; padding: 20px; border-radius: 15px; 
            border: 2px solid #0f0; text-align: center; width: 80%; font-size: 1.2rem;
        }
        #start-screen { 
            position: fixed; inset: 0; background: #000; z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        input { padding: 15px; border-radius: 25px; margin-bottom: 20px; width: 250px; text-align: center; }
        #btn-start { background: #0f0; padding: 20px 50px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:#0f0; margin-bottom: 20px;">SMARTLESSA</h1>
        <input type="text" id="user-name" placeholder="Твоє ім'я...">
        <button id="btn-start">РОЗПОЧАТИ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Натисніть СТАРТ</div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        let handLandmarker, scene, camera, renderer, holoPlane, masterGroup;
        let userName = "";
        let currentIdx = 0;
        let isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі?", a: "географічна" },
            { q: "Як називається повітряна оболонка?", a: "атмосфера" }
        ];

        // НАЙПРОСТІША ОЗВУЧКА (БЕЗ ЗОВНІШНІХ ПОСИЛАНЬ)
        function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // ХАК: Пробуємо знайти будь-яку мову, якщо української немає
            const voices = window.speechSynthesis.getVoices();
            const ukVoice = voices.find(v => v.lang.includes('uk'));
            
            if (ukVoice) {
                utterance.voice = ukVoice;
                utterance.lang = 'uk-UA';
            } else {
                // Якщо української немає, ми НЕ міняємо мову на англійську,
                // а просто кидаємо текст системі. Chrome спробує прочитати українську англійським акцентом.
                // Це краще, ніж нічого.
                utterance.lang = 'uk-UA';
            }

            utterance.onend = () => { isSpeaking = false; onEnd(); };
            isSpeaking = true;
            window.speechSynthesis.speak(utterance);
        }

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            const geometry = new THREE.PlaneGeometry(1, 1.2);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
            holoPlane = new THREE.Mesh(geometry, material);
            masterGroup.add(holoPlane);

            camera.position.z = 3;
            animate();
            
            speak(`Привіт, ${userName}! Покажи долоню, щоб почати.`);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const wrist = res.landmarks[0][0];
                    masterGroup.position.x = (0.5 - wrist.x) * 3;
                    masterGroup.position.y = (0.5 - wrist.y) * 2;
                    masterGroup.visible = true;
                    
                    // Проста перевірка жесту (якщо пальці вище долоні)
                    if (!isSpeaking && res.landmarks[0][8].y < res.landmarks[0][6].y && currentIdx < questions.length) {
                        triggerQuestion();
                    }
                } else {
                    masterGroup.visible = false;
                }
            }
            renderer.render(scene, camera);
        }

        function triggerQuestion() {
            if (isSpeaking) return;
            speak(questions[currentIdx].q, () => {
                setTimeout(() => {
                    currentIdx++;
                    if (currentIdx < questions.length) {
                        statusDiv.innerText = "Покажи жест для наступного питання";
                    } else {
                        statusDiv.innerText = "Квест закінчено!";
                    }
                }, 3000);
            });
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('start-screen').style.display = 'none';
            
            // Запуск камери
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            // Ініціалізація AI
            init();
        };

        // Прогрів голосів
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
