<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | PRO V2</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
       
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(255,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 15px #0f0; transition: width 0.5s ease; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #status {
            background: rgba(0, 0, 0, 0.85); padding: 18px 25px; border-radius: 25px;
            color: #fff; font-weight: bold; border: 2px solid #0f0;
            text-align: center; width: 90%; max-width: 500px;
            font-size: 1.2rem; box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #mic-btn {
            display: none; width: 85px; height: 85px; background: #ff4444; border-radius: 50%;
            border: 4px solid #fff; cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(255,0,0,0.4); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
       
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #002211 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 18px; border-radius: 50px; border: 2px solid #0f0; background: rgba(0,255,0,0.1); color: #0f0; text-align: center; margin-bottom: 25px; width: 300px; font-size: 1.3rem; outline: none; }
        #btn-start { background: #0f0; color: #000; padding: 20px 60px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; box-shadow: 0 0 30px #0f0; }
    </style>
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="start-screen">
        <h1 style="color:#0f0; font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 20px #0f0;">SMARTLESSA</h1>
        <input type="text" id="user-name" placeholder="Введи своє ім'я...">
        <button id="btn-start">РОЗПОЧАТИ КВЕСТ</button>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
   
    <div id="ui">
        <div id="status">Завантаження камери...</div>
        <div id="mic-btn">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');

        let handLandmarker, scene, camera, renderer, masterGroup, braceletGroup, holoPlane, holoVideo;
        let userName = "досліднику";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        const questions = [ /* твої питання */ ];

        function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 0.96;

            const voices = window.speechSynthesis.getVoices();
            const ukVoice = voices.find(v => v.lang.toLowerCase().includes('uk') || v.name.toLowerCase().includes('ukrain'));
            
            if (ukVoice) utterance.voice = ukVoice;

            utterance.onend = () => { isSpeaking = false; onEnd(); };
            isSpeaking = true;
            window.speechSynthesis.speak(utterance);
        }

        // === ОСНОВНИЙ КОД (скорочено для зручності) ===
        async function initAI() { /* ... */ }
        function setupScene() { /* ... */ }
        function triggerQuestion() { /* ... */ }

        micBtn.onclick = () => { /* твій код */ };

        function finishLesson() {
            speak(`Вітаю, ${userName}! Урок завершено. Твій результат: ${score} з 5!`, () => {
                setTimeout(() => location.reload(), 7000);
            });
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value.trim() || "досліднику";
            document.getElementById('start-screen').style.display = 'none';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.play();

                setupScene();
                await initAI();

                // ←←← НАЙВАЖЛИВІШЕ ДЛЯ НОУТБУКА ←←←
                window.speechSynthesis.getVoices(); // примусово

                setTimeout(() => {
                    speak(`Привіт, ${userName}! Покажи кулак ✊`, () => {
                        isWaitingForGesture = true;
                    });
                }, 1200);

            } catch (e) {
                alert("Доступ до камери заборонено");
            }
        };

        // Примусове завантаження голосів
        window.speechSynthesis.onvoiceschanged = () => console.log("Голоси завантажено:", window.speechSynthesis.getVoices().length);
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
