<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | PRO</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Progress bar */
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: rgba(255,255,255,0.2); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 15px #0f0; transition: width 0.5s ease; }

        #ui { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #status {
            background: rgba(0, 0, 0, 0.85); padding: 18px 25px; border-radius: 20px;
            color: #fff; font-weight: 600; border: 2px solid #0f0;
            text-align: center; width: 90%; max-width: 500px;
            font-size: 1.1rem; backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        #mic-btn {
            display: none; width: 80px; height: 80px; background: #ff4444; border-radius: 50%;
            border: 4px solid #fff; cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
            transition: transform 0.1s ease;
        }
        #mic-btn:active { transform: scale(0.95); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .pulse-animation { animation: pulse 1.5s infinite; }
        
        #text-input-area {
            display: none;
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border-radius: 60px;
            width: 90%;
            max-width: 400px;
            margin: 0 auto;
            z-index: 101;
        }
        #text-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #0f0;
            background: #111;
            color: #0f0;
            font-size: 1rem;
        }
        #submit-text {
            background: #0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }
        
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #003311 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; backdrop-filter: blur(8px); }
        input { padding: 15px; border-radius: 50px; border: 2px solid #0f0; background: rgba(0,0,0,0.7); color: #0f0; text-align: center; margin-bottom: 20px; width: 280px; font-size: 1.2rem; }
        #btn-start { background: #0f0; color: #000; padding: 18px 50px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; font-size: 1.4rem; transition: transform 0.2s; }
        #btn-start:hover { transform: scale(1.03); }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="start-screen">
        <h1 style="color:#0f0; margin-bottom:20px; font-size: 2.5rem;">⚡ SMARTLESSA</h1>
        <input type="text" id="user-name" placeholder="Твоє ім'я..." autocomplete="off">
        <button id="btn-start">ПОЧАТИ КВЕСТ</button>
        <p style="color:#aaa; margin-top: 30px; font-size: 0.8rem;">🎥 Потрібен доступ до камери та мікрофона<br>🤛 Покажи кулак щоб відповідати</p>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Завантаження...</div>
        <div id="mic-btn" class="pulse-animation">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>
    <div id="text-input-area">
        <input type="text" id="text-input" placeholder="Або впиши відповідь тут..." autocomplete="off">
        <button id="submit-text">Відповісти</button>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        // ---- DOM elements ----
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');
        const startScreen = document.getElementById('start-screen');
        const userNameInput = document.getElementById('user-name');
        const startBtn = document.getElementById('btn-start');
        const textInputArea = document.getElementById('text-input-area');
        const textInput = document.getElementById('text-input');
        const submitTextBtn = document.getElementById('submit-text');

        // ---- Global variables ----
        let handLandmarker = null;
        let scene, camera, renderer, ring, braceletGroup, masterGroup, holoPlane, particles;
        let userName = "досліднику";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true;   // чекаємо жест "кулак"
        let isSpeaking = false;
        let isAwaitingAnswer = false;      // чекаємо відповідь після питання
        let fallbackMode = false;           // якщо немає голосового вводу використовуємо текст
        
        // ---- Quiz data ----
        const questions = [
            { q: "Яка найбільша оболонка Землі об'єднує всі інші сфери?", a: ["географічна", "географічна оболонка"] },
            { q: "Як називається повітряна оболонка Землі?", a: ["атмосфера"] },
            { q: "Як називається тверда оболонка Землі?", a: ["літосфера"] },
            { q: "Назви водну оболонку нашої планети.", a: ["гідросфера"] },
            { q: "Як називається жива оболонка планети?", a: ["біосфера"] }
        ];

        // ---- Helper functions ----
        function updateProgress() {
            const percent = (currentIdx / questions.length) * 100;
            progressBar.style.width = percent + "%";
        }
        
        function speak(text, onEnd = () => {}) {
            if (!window.speechSynthesis) {
                statusDiv.innerText = text;
                if (onEnd) onEnd();
                return;
            }
            window.speechSynthesis.cancel();
            statusDiv.innerText = text;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 0.9;
            utterance.onend = () => { isSpeaking = false; if (onEnd) onEnd(); };
            isSpeaking = true;
            window.speechSynthesis.speak(utterance);
        }
        
        // Перевірка підтримки голосу
        function isSpeechRecognitionSupported() {
            return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
        }
        
        // Обробка відповіді (текст)
        function processAnswer(answerText) {
            if (!isAwaitingAnswer) return;
            isAwaitingAnswer = false;
            const lowerAns = answerText.toLowerCase().trim();
            const isCorrect = questions[currentIdx].a.some(ans => lowerAns.includes(ans));
            
            // Вимкнути мікрофон та текстовий інтерфейс
            micBtn.style.display = "none";
            textInputArea.style.display = "none";
            
            if (isCorrect) {
                score++;
                ring.material.emissive.setHex(0x00ff00);
                speak("Правильно! Ти молодець!");
            } else {
                ring.material.emissive.setHex(0xffaa00);
                speak(`Не зовсім. Це ${questions[currentIdx].a[0]}.`);
            }
            
            setTimeout(() => {
                ring.material.emissive.setHex(0x00ffaa); // повернути колір
                currentIdx++;
                if (currentIdx < questions.length) {
                    triggerQuestion();
                } else {
                    finishLesson();
                }
            }, 2500);
        }
        
        // Запуск питання
        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            if (isAwaitingAnswer) return; // вже чекаємо відповіді
            isWaitingForGesture = false;
            isAwaitingAnswer = true;
            
            // Показати голограму (якщо є)
            if (holoPlane) holoPlane.visible = true;
            updateProgress();
            
            speak(questions[currentIdx].q, () => {
                // Після того, як питання промовлено, активуємо інтерфейс відповіді
                if (fallbackMode) {
                    textInputArea.style.display = "flex";
                    textInput.value = "";
                    textInput.focus();
                    statusDiv.innerText = "✏️ Напиши відповідь і натисни кнопку";
                } else {
                    micBtn.style.display = "flex";
                    statusDiv.innerText = "🎤 Говори відповідь зараз...";
                }
            });
        }
        
        function finishLesson() {
            updateProgress();
            if (particles) particles.visible = true;
            speak(`Квест завершено! ${userName}, твій результат: ${score} з ${questions.length}!`);
            setTimeout(() => {
                if (confirm("Бажаєш пройти ще раз?") ) location.reload();
                else location.reload(); // або просто перезавантажити
            }, 5000);
        }
        
        // ---- Налаштування Three.js ----
        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            
            masterGroup = new THREE.Group();
            scene.add(masterGroup);
            
            braceletGroup = new THREE.Group();
            masterGroup.add(braceletGroup);
            
            // Кільце на зап'ясті
            const ringGeo = new THREE.TorusGeometry(0.28, 0.018, 32, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2.2 });
            ring = new THREE.Mesh(ringGeo, ringMat);
            braceletGroup.add(ring);
            
            // Спроба створити голограму (якщо відео існує)
            try {
                const holoVideo = document.createElement('video');
                holoVideo.src = 'assets/video/guide_hologram.mp4';
                holoVideo.muted = true;
                holoVideo.loop = true;
                holoVideo.playsInline = true;
                holoVideo.crossOrigin = "Anonymous";
                holoVideo.preload = "auto";
                holoVideo.onerror = () => { console.warn("Голограма не завантажилась"); if(holoPlane) holoPlane.visible = false; };
                holoVideo.oncanplay = () => { if(holoVideo.readyState >= 2) holoVideo.play().catch(e=>console.warn(e)); };
                
                const videoTex = new THREE.VideoTexture(holoVideo);
                const holoMat = new THREE.MeshStandardMaterial({ map: videoTex, color: 0x88ff88, emissive: 0x226622, transparent: true, side: THREE.DoubleSide });
                holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 1.0), holoMat);
                holoPlane.position.set(0, 0.6, 0.05);
                holoPlane.visible = false;
                masterGroup.add(holoPlane);
            } catch(e) {
                // fallback: просто світна сфера
                holoPlane = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16,16), new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44 }));
                holoPlane.position.set(0,0.5,0.1);
                holoPlane.visible = false;
                masterGroup.add(holoPlane);
            }
            
            // Частинки для фіналу
            const pCount = 200;
            const pGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                pos[i*3] = (Math.random() - 0.5) * 2;
                pos[i*3+1] = (Math.random() - 0.5) * 2;
                pos[i*3+2] = (Math.random() - 0.5) * 1.5;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x44ff44, size: 0.04, transparent: true, blending: THREE.AdditiveBlending }));
            particles.visible = false;
            masterGroup.add(particles);
            
            camera.position.z = 3.2;
            // Світло
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(1,2,1);
            scene.add(dirLight);
            
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2 && masterGroup) {
                try {
                    const results = handLandmarker.detectForVideo(video, performance.now());
                    if (results.landmarks && results.landmarks.length > 0) {
                        const lm = results.landmarks[0];
                        const wrist = lm[0];
                        // Оновлення позиції браслета по зап'ястю
                        masterGroup.position.x = (0.5 - wrist.x) * 3.5;
                        masterGroup.position.y = (0.5 - wrist.y) * 2.8;
                        masterGroup.visible = true;
                        
                        // Виявлення кулаку: якщо кінчик вказівного пальця (8) нижче суглоба (6) -> кулак
                        const tipY = lm[8].y;
                        const knuckleY = lm[6].y;
                        if (isWaitingForGesture && tipY > knuckleY + 0.02) {
                            isWaitingForGesture = false;
                            triggerQuestion();
                        }
                    } else {
                        masterGroup.visible = false;
                    }
                } catch(e) { console.warn(e); }
            }
            if (braceletGroup) braceletGroup.rotation.z += 0.025;
            if (particles && particles.visible) {
                particles.rotation.y += 0.03;
                particles.rotation.x += 0.01;
                particles.scale.multiplyScalar(1.008);
            }
            if (renderer && scene && camera) renderer.render(scene, camera);
        }
        
        // ---- Ініціалізація AI MediaPipe ----
        async function initAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                statusDiv.innerText = "✋ Система готова! Покажи кулак 👊";
                isWaitingForGesture = true;
            } catch(err) {
                console.error("Помилка завантаження HandLandmarker", err);
                statusDiv.innerText = "Помилка завантаження трекера рук. Перезавантажте сторінку.";
            }
        }
        
        // ---- Головний старт ----
        async function startExperience() {
            userName = userNameInput.value.trim();
            if (userName === "") userName = "досліднику";
            startScreen.style.display = "none";
            
            // Перевірка підтримки SpeechRecognition
            if (!isSpeechRecognitionSupported()) {
                fallbackMode = true;
                statusDiv.innerText = "🎙️ Ваш браузер не підтримує голос. Використовуйте текстовий ввід.";
                micBtn.style.display = "none";
                // текстовий інпут з'явиться після питання
            } else {
                fallbackMode = false;
            }
            
            // Доступ до камери + обов'язковий video.play()
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                await video.play();   // критично для десктопа!
                statusDiv.innerText = "Камера працює. Завантаження ШІ...";
                setupScene();
                await initAI();
                speak(`Привіт, ${userName}! Покажи кулак, щоб розпочати вікторину.`, () => {});
                isWaitingForGesture = true;
            } catch (err) {
                console.error("Camera error", err);
                statusDiv.innerText = "❌ Немає доступу до камери. Перевірте дозволи та перезавантажте сторінку.";
                alert("Без камери AR не працює. Дозвольте доступ до камери.");
            }
        }
        
        // ---- Обробники подій ----
        startBtn.addEventListener('click', startExperience);
        
        // Голосова відповідь
        micBtn.addEventListener('click', () => {
            if (!isAwaitingAnswer) return;
            if (fallbackMode) return;
            
            const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecog) {
                statusDiv.innerText = "Голос не підтримується. Використовуйте текст.";
                fallbackMode = true;
                micBtn.style.display = "none";
                return;
            }
            const recognition = new SpeechRecog();
            recognition.lang = 'uk-UA';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            micBtn.style.background = "#00aa44";
            statusDiv.innerText = "🎙️ Слухаю... скажи відповідь";
            
            recognition.onstart = () => {
                micBtn.style.background = "#44ff44";
            };
            recognition.onerror = (event) => {
                console.error("Speech error", event.error);
                micBtn.style.background = "#ff4444";
                statusDiv.innerText = "Не розчув. Спробуй ще раз кнопкою.";
                isAwaitingAnswer = true; // залишаємось в режимі очікування
                micBtn.style.display = "flex";
                setTimeout(() => { micBtn.style.background = "#ff4444"; }, 1000);
            };
            recognition.onresult = (event) => {
                const recognized = event.results[0][0].transcript;
                statusDiv.innerText = `📝 Ви сказали: "${recognized}"`;
                micBtn.style.background = "#ff4444";
                recognition.stop();
                processAnswer(recognized);
            };
            recognition.start();
        });
        
        // Текстова відповідь (fallback)
        submitTextBtn.addEventListener('click', () => {
            if (!isAwaitingAnswer) return;
            const answer = textInput.value.trim();
            if (answer === "") {
                statusDiv.innerText = "Напиши відповідь у полі!";
                return;
            }
            textInputArea.style.display = "none";
            processAnswer(answer);
        });
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitTextBtn.click();
        });
        
        // Запобігання помилці, якщо відео не завантажилось одразу
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
