<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GEO QUEST AR | 2026</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Геймерський прогрес-бар */
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(0,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #00ff88); box-shadow: 0 0 20px #00f2ff; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #ui { position: absolute; bottom: 40px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #status {
            background: rgba(0, 20, 20, 0.7); padding: 20px 30px; border-radius: 24px;
            color: #00ffff; font-weight: 700; border: 2px solid rgba(0, 255, 255, 0.5);
            text-align: center; width: 85%; max-width: 500px;
            font-size: 1.2rem; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #mic-btn {
            display: none; width: 90px; height: 90px; background: #ff0055; border-radius: 50%;
            border: 5px solid #fff; cursor: pointer; align-items: center; justify-content: center;
            animation: pulse 1.5s infinite; box-shadow: 0 0 30px #ff0055;
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px #ff0055; } 50% { transform: scale(1.1); box-shadow: 0 0 40px #ff0055; } 100% { transform: scale(1); } }
        
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #001a1a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        input { padding: 20px; border-radius: 15px; border: 2px solid #00ffff; background: rgba(0,255,255,0.05); color: #fff; text-align: center; margin-bottom: 25px; width: 300px; font-size: 1.3rem; outline: none; }
        #btn-start { background: #00ffff; color: #000; padding: 20px 60px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        #btn-start:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="start-screen">
        <h1 style="color:#00ffff; margin-bottom:10px; font-size: 3rem; text-shadow: 0 0 20px #00ffff;">GEO AR</h1>
        <p style="color: #00aaaa; margin-bottom: 30px;">LEVEL: GEOGRAPHY EXPERT</p>
        <input type="text" id="user-name" placeholder="Введіть нікнейм...">
        <button id="btn-start">Ініціалізація</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Завантаження систем...</div>
        <div id="mic-btn">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');

        let handLandmarker, scene, camera, renderer, ring, masterGroup, holoPlane, holoVideo;
        let userName = "Explorer";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі, що об’єднує всі інші сфери?", a: ["географічна"] },
            { q: "Як називається повітряна оболонка планети?", a: ["атмосфера"] },
            { q: "Яка сфера Землі складається з усіх її вод?", a: ["гідросфера"] },
            { q: "Тверда оболонка Землі — це...", a: ["літосфера"] },
            { q: "Сфера, де панує життя, називається...", a: ["біосфера"] }
        ];

        function speak(text, onEnd = () => {}) {
            isSpeaking = true;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.rate = 1.1; 
            utterance.onend = () => { isSpeaking = false; onEnd(); };
            window.speechSynthesis.speak(utterance);
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            statusDiv.innerText = "СИСТЕМА ГОТОВА. ПОКАЖИ КУЛАК ✊";
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);
            
            // Кільце-індикатор
            ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.3, 0.012, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 })
            );
            masterGroup.add(ring);

            // Голограма з покращеним шейдером
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4'; 
            holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;
            
            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.ShaderMaterial({
                uniforms: { 
                    uVideo: { value: videoTex },
                    uTime: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }`,
                fragmentShader: `
                    uniform sampler2D uVideo;
                    uniform float uTime;
                    varying vec2 vUv;
                    void main() {
                        vec4 color = texture2D(uVideo, vUv);
                        // Хромакей (видалення зеленого)
                        if (color.g > (color.r + color.b) * 0.5 + 0.1) discard;
                        
                        // Ефект скануючих ліній (натяк на голограму)
                        float scanline = sin(vUv.y * 200.0 + uTime * 5.0) * 0.1;
                        vec3 finalColor = color.rgb + vec3(0.0, 0.2, 0.3) * scanline;
                        
                        // Легке блакитне світіння
                        finalColor += vec3(0.0, 0.1, 0.2);
                        
                        gl_FragColor = vec4(finalColor, 0.9);
                    }`,
                transparent: true
            });

            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 1.4), holoMat);
            holoPlane.position.set(0, 0.8, 0);
            holoPlane.visible = false;
            masterGroup.add(holoPlane);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            camera.position.z = 3.5;
            animate();
        }

        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            isWaitingForGesture = false;
            
            holoPlane.visible = true;
            try { holoVideo.play(); } catch(e) {}
            
            progressBar.style.width = ((currentIdx / questions.length) * 100) + "%";
            
            speak(questions[currentIdx].q, () => {
                micBtn.style.display = "flex";
                statusDiv.innerText = "СЛУХАЮ ВІДПОВІДЬ...";
            });
        }

        micBtn.onclick = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) { alert("Ваш браузер не підтримує розпізнавання мови."); return; }
            
            const rec = new SpeechRecognition();
            rec.lang = 'uk-UA';
            rec.onstart = () => { micBtn.style.background = "#00ff88"; };
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase().trim();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));
                
                micBtn.style.display = "none";
                micBtn.style.background = "#ff0055";

                if (isCorrect) {
                    score++;
                    ring.material.emissive.setHex(0x00ff88);
                    speak("Чудово! Це правильна відповідь.");
                } else {
                    ring.material.emissive.setHex(0xffaa00);
                    speak(`Майже. Правильна відповідь: ${questions[currentIdx].a[0]}.`);
                }

                setTimeout(() => {
                    ring.material.emissive.setHex(0x00ffff);
                    currentIdx++;
                    holoPlane.visible = false;
                    holoVideo.pause();

                    if (currentIdx < questions.length) {
                        isWaitingForGesture = true;
                        statusDiv.innerText = `РІВЕНЬ ${currentIdx + 1}. ПОКАЖИ КУЛАК ✊`;
                    } else {
                        finishQuest();
                    }
                }, 2500);
            };
            rec.start();
        };

        function finishQuest() {
            progressBar.style.width = "100%";
            statusDiv.style.borderColor = "#00ff88";
            speak(`Місія виконана! ${userName}, твій результат: ${score} з 5. Ти справжній географ!`, () => {
                setTimeout(() => location.reload(), 7000);
            });
        }

        function animate(time) {
            requestAnimationFrame(animate);
            if (holoPlane && holoPlane.material.uniforms) {
                holoPlane.material.uniforms.uTime.value = time / 1000;
            }

            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const hand = res.landmarks[0];
                    const wrist = hand[0];
                    
                    // Плавне слідування за рукою
                    masterGroup.position.x = (0.5 - wrist.x) * 4;
                    masterGroup.position.y = (0.5 - wrist.y) * 3;
                    masterGroup.visible = true;
                    
                    // Логіка КУЛАКА (всі кінчики пальців нижче за середні фаланги)
                    const isFist = hand[8].y > hand[6].y && hand[12].y > hand[10].y && hand[16].y > hand[14].y;
                    
                    if (isWaitingForGesture && isFist) {
                        triggerQuestion();
                    }
                } else {
                    masterGroup.visible = false;
                }
            }
            if (ring) ring.rotation.z += 0.03;
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "Explorer";
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                setupScene();
                await initAI();
                speak(`Привіт, ${userName}! Давай перевіримо твої знання. Покажи кулак, щоб почати.`);
            } catch (err) {
                alert("Потрібен доступ до камери!");
            }
        };
    </script>
</body>
</html>
