<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SMARTLESSA | FIXED AR</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: sans-serif; color: #0f0; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-btn { padding: 15px 40px; background: #0f0; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #debug-log { position: fixed; top: 10px; left: 10px; color: red; font-size: 10px; z-index: 4000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="debug-log"></div>
    <div id="loading"><p id="status-text">Завантаження бібліотек...</p></div>

    <div id="name-modal">
        <h2 style="color:#0f0">🦊 SMARTLESSA</h2>
        <input type="text" id="user-name" placeholder="Твоє ім'я" style="padding:10px; border-radius:20px; margin-top:10px; text-align:center;">
        <button id="start-btn">ПОЧАТИ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script>
        const log = (msg) => { document.getElementById('debug-log').innerText += msg + "\n"; console.log(msg); };
        const status = (msg) => { document.getElementById('status-text').innerText = msg; };

        let handLandmarker;
        let video = document.getElementById('video');
        let userName = "досліднику";
        let hologramActive = false;

        async function setupAR() {
            try {
                status("Ініціалізація AI...");
                const vision = await createFilesetResolver({
                    wasmLoaderPath: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm/vision_bundle_wasm_loader.js",
                    wasmBinaryPath: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm/vision_bundle_wasm_bin.js"
                });
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                log("AI готовий");
            } catch (e) { log("Помилка AI: " + e); }
        }

        async function start() {
            try {
                status("Запуск камери...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('loading').style.display = 'none';
                    initThree();
                };
            } catch (e) { log("Помилка камери: " + e); }
        }

        // THREE.JS ЧАСТИНА (Спрощена для стабільності)
        let scene, camera, renderer, ring, holoPlane, holoVideo;
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Кільце
            ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.01, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00ffaa }));
            scene.add(ring);

            // Відео
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4';
            holoVideo.loop = true; holoVideo.muted = true; holoVideo.playsInline = true;
            
            const tex = new THREE.VideoTexture(holoVideo);
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.8 }));
            holoPlane.position.y = 0.4;
            holoPlane.visible = false;
            ring.add(holoPlane);

            camera.position.z = 2;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks[0]) {
                    const wrist = results.landmarks[0][0];
                    ring.position.x = (0.5 - wrist.x) * 3; // Інверсія для фронталки
                    ring.position.y = (0.5 - wrist.y) * 2;
                    ring.visible = true;

                    // Жест кулака
                    if (results.landmarks[0][8].y > results.landmarks[0][6].y && !hologramActive) {
                        hologramActive = true;
                        holoPlane.visible = true;
                        holoVideo.play();
                    }
                } else { ring.visible = false; }
            }
            if (ring) ring.rotation.z += 0.02;
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('name-modal').style.display = 'none';
            await setupAR();
            await start();
        };
    </script>
</body>
</html>
