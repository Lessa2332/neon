<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | ONLINE VOICE</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: rgba(255,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; box-shadow: 0 0 15px #0f0; transition: width 0.5s ease; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #status { background: rgba(0, 0, 0, 0.85); padding: 18px 25px; border-radius: 25px; color: #fff; font-weight: bold; border: 2px solid #0f0; text-align: center; width: 90%; max-width: 500px; font-size: 1.2rem; }
        #mic-btn { display: none; width: 85px; height: 85px; background: #ff4444; border-radius: 50%; border: 4px solid #fff; cursor: pointer; align-items: center; justify-content: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #002211 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { padding: 18px; border-radius: 50px; border: 2px solid #0f0; background: rgba(0,255,0,0.1); color: #0f0; text-align: center; margin-bottom: 25px; width: 300px; font-size: 1.3rem; outline: none; }
        #btn-start { background: #0f0; color: #000; padding: 20px 60px; border-radius: 50px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="start-screen">
        <h1 style="color:#0f0; font-size: 3rem; margin-bottom: 30px; text-shadow: 0 0 20px #0f0;">SMARTLESSA</h1>
        <input type="text" id="user-name" placeholder="Введи своє ім'я...">
        <button id="btn-start">РОЗПОЧАТИ КВЕСТ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Натисніть кнопку старту...</div>
        <div id="mic-btn">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');

        let handLandmarker, scene, camera, renderer, ring, braceletGroup, masterGroup, holoPlane, holoVideo, particles;
        let userName = "досліднику";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        const questions = [
            { q: "Яка найбільша оболонка Землі об'єднує всі інші сфери?", a: ["географічна"] },
            { q: "Як називається повітряна оболонка Землі?", a: ["атмосфера"] },
            { q: "Як називається тверда оболонка Землі?", a: ["літосфера"] },
            { q: "Назви водну оболонку нашої планети.", a: ["гідросфера"] },
            { q: "Як називається жива оболонка планети?", a: ["біосфера"] }
        ];

        // ФУНКЦІЯ ОЗВУЧКИ: ВИКОРИСТОВУЄ ОНЛАЙН СЕРВІСИ ЯКЩО НЕМАЄ СИСТЕМНИХ
        async function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            window.speechSynthesis.cancel();

            // 1. Спробуємо знайти онлайн-голос Google в браузері
            let voices = window.speechSynthesis.getVoices();
            let ukVoice = voices.find(v => v.lang.includes('uk') || v.name.includes('Ukrainian'));

            if (ukVoice) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.voice = ukVoice;
                utterance.lang = 'uk-UA';
                utterance.rate = 1.0;
                utterance.onend = () => { isSpeaking = false; onEnd(); };
                isSpeaking = true;
                window.speechSynthesis.speak(utterance);
            } 
            else {
                // 2. ЯКЩО УКРАЇНСЬКОЇ НЕМАЄ ВЗАГАЛІ (навіть онлайн Google) — Використовуємо зовнішній синтезатор
                console.warn("Український TTS не знайдено. Використовую зовнішній API.");
                const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=uk&client=tw-ob`);
                audio.onended = () => { isSpeaking = false; onEnd(); };
                isSpeaking = true;
                audio.play().catch(e => {
                    console.error("Помилка відтворення аудіо", e);
                    isSpeaking = false;
                    onEnd(); // Продовжуємо квест навіть без звуку
                });
            }
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            statusDiv.innerText = "Система готова! Покажи кулак ✊";
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            masterGroup = new THREE.Group();
            scene.add(masterGroup);
            braceletGroup = new THREE.Group();
            masterGroup.add(braceletGroup);
            ring = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.015, 16, 100), new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2.5 }));
            braceletGroup.add(ring);
            holoVideo = document.createElement('video');
            holoVideo.src = 'assets/video/guide_hologram.mp4'; 
            holoVideo.muted = true; holoVideo.loop = true; holoVideo.playsInline = true;
            const videoTex = new THREE.VideoTexture(holoVideo);
            const holoMat = new THREE.ShaderMaterial({
                uniforms: { uVideo: { value: videoTex } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `uniform sampler2D uVideo; varying vec2 vUv; void main() { vec4 color = texture2D(uVideo, vUv); if (color.g > (color.r + color.b) * 0.5 + 0.1) discard; gl_FragColor = vec4(color.rgb, 1.0); }`,
                transparent: true
            });
            holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 1.1), holoMat);
            holoPlane.position.set(0, 0.6, 0.05);
            holoPlane.visible = false;
            masterGroup.add(holoPlane);
            camera.position.z = 3.5;
            animate();
        }

        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            isWaitingForGesture = false;
            holoPlane.visible = true;
            holoVideo.play();
            progressBar.style.width = ((currentIdx) / questions.length * 100) + "%";
            speak(questions[currentIdx].q, () => {
                holoVideo.pause();
                micBtn.style.display = "flex";
                statusDiv.innerText = "🎤 Говори зараз...";
                statusDiv.style.borderColor = "#ff4444";
            });
        }

        micBtn.onclick = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) {
                alert("Ваш браузер не підтримує розпізнавання мови. Спробуйте Chrome.");
                return;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'uk-UA';
            rec.onstart = () => micBtn.style.background = "#00ff00";
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase().trim();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));
                micBtn.style.display = "none";
                micBtn.style.background = "#ff4444";
                statusDiv.style.borderColor = "#0f0";
                if (isCorrect) {
                    score++;
                    ring.material.emissive.setHex(0x00ff00);
                    speak("Правильно! Чудово!");
                } else {
                    ring.material.emissive.setHex(0xffaa00);
                    speak(`Майже. Це ${questions[currentIdx].a[0]}.`);
                }
                setTimeout(() => {
                    ring.material.emissive.setHex(0x00ffaa);
                    currentIdx++;
                    if (currentIdx < questions.length) triggerQuestion();
                    else finishLesson();
                }, 3000);
            };
            rec.start();
        };

        function finishLesson() {
            progressBar.style.width = "100%";
            holoPlane.visible = true;
            holoVideo.play();
            speak(`Вітаю! Урок завершено. Твій результат: ${score} з 5!`, () => {
                setTimeout(() => location.reload(), 10000);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const wrist = res.landmarks[0][0];
                    masterGroup.position.x = (0.5 - wrist.x) * 3.8;
                    masterGroup.position.y = (0.5 - wrist.y) * 2.8;
                    masterGroup.visible = true;
                    if (isWaitingForGesture && res.landmarks[0][8].y > res.landmarks[0][6].y) triggerQuestion();
                } else { masterGroup.visible = false; }
            }
            if (braceletGroup) braceletGroup.rotation.z += 0.02;
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('start-screen').style.display = 'none';
            // Прогрів голосів
            window.speechSynthesis.getVoices();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            setupScene();
            await initAI();
            speak(`Привіт, ${userName}! Покажи кулак!`);
        };
    </script>
</body>
</html>
