<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA | NEON AR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: black; font-family: 'Courier New', monospace; color: #0f0; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        #name-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px; transition: opacity 0.5s;
        }
        #user-name {
            padding: 15px; border-radius: 50px; border: 2px solid #0f0;
            background: transparent; color: #0f0; font-size: 1.2rem;
            text-align: center; width: 80%; max-width: 300px; margin-bottom: 25px; outline: none;
        }
        #start-btn {
            background: #0f0; color: black; padding: 15px 45px;
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 0 20px #0f0; font-size: 1.1rem;
        }

        .top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 200; }
        .top-bar button { background: rgba(0,0,0,0.7); border: 2px solid #0f0; color: #0f0; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; }
        
        #ui {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; z-index: 100;
            text-align: center; border: 1px solid #0f0;
        }
        #status { color: #ffdd88; font-weight: bold; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; color: #0f0; }
        .spinner { width: 40px; height: 40px; border: 4px solid #0f0; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div><p id="loading-text">Ініціалізація...</p></div>

    <div id="name-modal">
        <h2 style="color:#0f0; margin-bottom:20px;">🦊 Я СМАРТЛЕССА.<br>ЯК ТЕБЕ ЗВАТИ?</h2>
        <input type="text" id="user-name" placeholder="Твоє ім'я..." autocomplete="off">
        <button id="start-btn">ПОЧАТИ УРОК</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="top-bar">
        <button id="camera-toggle">🔄 КАМЕРА</button>
        <button onclick="location.reload()">⟳ СКИНУТИ</button>
    </div>

    <div id="ui">
        <div id="status">👋 Покажи долоню</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

        const videoEl = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const loadText = document.getElementById('loading-text');
        
        let userName = "досліднику";
        let handLandmarker;
        let hologramActive = false;
        let currentFacingMode = 'user'; 

        // Гуртовий запуск звуку
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            window.speechSynthesis.speak(utterance);
        }

        // THREE.JS SCENE
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 3;
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const braceletGroup = new THREE.Group();
        scene.add(braceletGroup);
        
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(0.2, 0.01, 16, 100), 
            new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 2 })
        );
        braceletGroup.add(ring);
        braceletGroup.add(new THREE.PointLight(0x00ffaa, 2, 3));

        // ВІДЕО-ГОЛОГРАМА
        const holoVideo = document.createElement('video');
        holoVideo.src = 'assets/video/guide_hologram.mp4'; 
        holoVideo.loop = true;
        holoVideo.muted = true;
        holoVideo.playsInline = true;
        holoVideo.crossOrigin = "anonymous";
        holoVideo.load();

        const videoTex = new THREE.VideoTexture(holoVideo);
        const holoMat = new THREE.ShaderMaterial({
            uniforms: { uVideo: { value: videoTex }, uTime: { value: 0 } },
            transparent: true,
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform sampler2D uVideo; uniform float uTime; varying vec2 vUv;
                void main() {
                    vec4 color = texture2D(uVideo, vUv);
                    float greenness = color.g - (color.r + color.b) * 0.5;
                    if (greenness > 0.2) discard;
                    gl_FragColor = vec4(color.rgb, 0.8);
                }
            `
        });
        const holoPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), holoMat);
        holoPlane.position.y = 0.4;
        braceletGroup.add(holoPlane);
        holoPlane.visible = false;

        async function initCamera() {
            loadText.innerText = "Доступ до камери...";
            if (videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode } 
            });
            videoEl.srcObject = stream;
            videoEl.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            return new Promise(resolve => videoEl.onloadedmetadata = () => resolve());
        }

        async function setupAR() {
            loadText.innerText = "Завантаження ШІ...";
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
        }

        function loop() {
            requestAnimationFrame(loop);
            if (handLandmarker && videoEl.readyState >= 2) {
                const res = handLandmarker.detectForVideo(videoEl, performance.now());
                if (res.landmarks && res.landmarks[0]) {
                    const wrist = res.landmarks[0][0];
                    // Корекція X для фронтальної камери
                    const xCorrected = currentFacingMode === 'user' ? (1 - wrist.x) : wrist.x;
                    braceletGroup.position.x = (xCorrected - 0.5) * 3;
                    braceletGroup.position.y = (0.5 - wrist.y) * 2;
                    braceletGroup.visible = true;

                    // Перевірка кулака
                    const lm = res.landmarks[0];
                    if (lm[8].y > lm[6].y && lm[12].y > lm[10].y && !hologramActive) {
                        hologramActive = true;
                        holoPlane.visible = true;
                        holoVideo.play();
                        statusDiv.textContent = `🦊 Привіт, ${userName}!`;
                        speak(`Привіт, ${userName}!`);
                    }
                } else {
                    braceletGroup.visible = false;
                }
            }
            ring.rotation.y += 0.02;
            holoMat.uniforms.uTime.value = performance.now() / 1000;
            renderer.render(scene, camera3D);
        }

        document.getElementById('start-btn').onclick = async () => {
            userName = document.getElementById('user-name').value || "досліднику";
            document.getElementById('name-modal').style.display = 'none';
            try {
                await initCamera();
                await setupAR();
                document.getElementById('loading').style.display = 'none';
                loop();
            } catch (err) {
                loadText.innerText = "Помилка камери!";
                console.error(err);
            }
        };

        document.getElementById('camera-toggle').onclick = async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await initCamera();
        };
    </script>
</body>
</html>
