<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMARTLESSA AR | GAMER EDITION</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Orbitron', 'Segoe UI', sans-serif; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1); }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* ПРОГРЕС-БАР (Кіберпанк стиль) */
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(0,255,255,0.1); z-index: 150; }
        #progress-bar { width: 0%; height: 100%; background: #00ffff; box-shadow: 0 0 15px #00ffff; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #ui { position: absolute; bottom: 40px; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #status {
            background: rgba(0, 0, 0, 0.8); padding: 20px 30px; border-radius: 15px;
            color: #00ffff; font-weight: 600; border: 1px solid #00ffff;
            text-align: center; width: 85%; max-width: 500px;
            font-size: 1.2rem; text-shadow: 0 0 10px #00ffff;
            backdrop-filter: blur(10px);
        }
        #mic-btn {
            display: none; width: 70px; height: 70px; background: #ff0055; border-radius: 50%;
            border: 3px solid #fff; cursor: pointer; align-items: center; justify-content: center;
            box-shadow: 0 0 20px #ff0055; animation: pulse 1.2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        h1 { color: #00ffff; margin-bottom: 30px; font-size: 2.5rem; letter-spacing: 5px; text-shadow: 0 0 20px #00ffff; }
        input { padding: 18px; border-radius: 10px; border: 2px solid #00ffff; background: rgba(0,255,255,0.1); color: #fff; text-align: center; margin-bottom: 25px; width: 300px; font-size: 1.2rem; outline: none; }
        #btn-start { background: #00ffff; color: #000; padding: 20px 60px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; font-size: 1.5rem; transition: 0.3s; }
        #btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px #00ffff; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="start-screen">
        <h1>SMARTLESSA</h1>
        <input type="text" id="user-name" placeholder="Твій нікнейм...">
        <button id="btn-start">ВХІД У ГРУ</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="status">Ініціалізація нейромережі...</div>
        <div id="mic-btn">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.skypack.dev/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const micBtn = document.getElementById('mic-btn');
        const progressBar = document.getElementById('progress-bar');

        let handLandmarker, scene, camera, renderer, ring, masterGroup, particles;
        let userName = "Гравець";
        let score = 0, currentIdx = 0;
        let isWaitingForGesture = true, isSpeaking = false;

        // АДАПТОВАНІ ЗАПИТАННЯ
        const questions = [
            { q: "Привіт! Давай перевіримо твій доступ. Як звати твою улюблену кішку, яка в цій хаті головна?", a: ["жасмінка", "жасмін", "жасміночка"] },
            { q: "Уяви, що ти в RPG. Який 'артефакт' дає тобі +100 до настрою: піца, енергетик чи мурчання Жасмінки?", a: ["мурчання", "кішка", "жасмінка", "жасмін"] },
            { q: "Геймерське питання: як називається фінальний і найсильніший противник у грі, якого треба здолати?", a: ["бос", "boss", "левел бос"] },
            { q: "Як називається стан, коли гра підвисає, а пінг злітає до небес?", a: ["лаг", "лаги", "пінг", "лагає"] },
            { q: "І останнє: хто тут професійний геймер і справжній майстер квестів?", a: ["я", "мейбі"] } 
        ];

        function updateProgress() {
            const percent = (currentIdx / questions.length) * 100;
            progressBar.style.width = percent + "%";
        }

        function speak(text, onEnd = () => {}) {
            statusDiv.innerText = text;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uk-UA';
            utterance.pitch = 0.9; // Трохи нижчий голос для серйозності
            utterance.onend = () => { isSpeaking = false; onEnd(); };
            isSpeaking = true;
            window.speechSynthesis.speak(utterance);
        }

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            statusDiv.innerText = "Система онлайн. Покажи КУЛАК ✊ для старту!";
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            masterGroup = new THREE.Group();
            scene.add(masterGroup);

            // Неонове кільце на руку
            ring = new THREE.Mesh(
                new THREE.TorusGeometry(0.3, 0.02, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 5 })
            );
            masterGroup.add(ring);

            // Частинки для фіналу
            const pGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(200 * 3);
            for(let i=0; i<600; i++) pos[i] = (Math.random()-0.5)*3;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.05 }));
            particles.visible = false;
            masterGroup.add(particles);

            const light = new THREE.PointLight(0x00ffff, 10, 10);
            scene.add(light);

            camera.position.z = 4;
            animate();
        }

        function triggerQuestion() {
            if (isSpeaking || currentIdx >= questions.length) return;
            isWaitingForGesture = false;
            updateProgress();
            
            speak(questions[currentIdx].q, () => {
                micBtn.style.display = "flex";
                statusDiv.innerText = "🎤 Слухаю відповідь...";
            });
        }

        micBtn.onclick = () => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitwebkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Твій браузер не підтримує розпізнавання мови.");
                return;
            }
            const rec = new SpeechRecognition();
            rec.lang = 'uk-UA';
            rec.onstart = () => micBtn.style.boxShadow = "0 0 30px #00ff00";
            rec.onresult = (e) => {
                const res = e.results[0][0].transcript.toLowerCase().trim();
                const isCorrect = questions[currentIdx].a.some(ans => res.includes(ans));

                micBtn.style.display = "none";

                if (isCorrect) {
                    score++;
                    ring.material.emissive.setHex(0x00ff00);
                    speak("Прийнято! Це правильна відповідь.");
                } else {
                    ring.material.emissive.setHex(0xff0055);
                    speak(`Помилка доступу. Правильно було: ${questions[currentIdx].a[0]}.`);
                }

                setTimeout(() => {
                    ring.material.emissive.setHex(0x00ffff);
                    currentIdx++;
                    if (currentIdx < questions.length) triggerQuestion();
                    else finishLesson();
                }, 2000);
            };
            rec.start();
        };

        function finishLesson() {
            updateProgress();
            particles.visible = true;
            speak(`Місію виконано! ${userName}, твій рахунок: ${score} з 5. Жасмінка тобою пишається!`, () => {
                setTimeout(() => location.reload(), 6000);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (handLandmarker && video.readyState >= 2) {
                const res = handLandmarker.detectForVideo(video, performance.now());
                if (res.landmarks?.[0]) {
                    const wrist = res.landmarks[0][0];
                    masterGroup.position.x = (0.5 - wrist.x) * 4;
                    masterGroup.position.y = (0.5 - wrist.y) * 3;
                    masterGroup.visible = true;
                    
                    // Жест кулака (якщо кінчик вказівного пальця нижче основи)
                    if (isWaitingForGesture && res.landmarks[0][8].y > res.landmarks[0][6].y) triggerQuestion();
                } else { masterGroup.visible = false; }
            }
            if (ring) ring.rotation.x += 0.05; ring.rotation.y += 0.02;
            if (particles && particles.visible) {
                particles.rotation.y += 0.01;
                particles.scale.multiplyScalar(1.002);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').onclick = async () => {
            userName = document.getElementById('user-name').value || "Гравець";
            document.getElementById('start-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                setupScene();
                await initAI();
                speak(`Вітаю в системі, ${userName}! Покажи кулак, щоб почати гру.`);
            } catch (err) {
                alert("Потрібен доступ до камери!");
            }
        };
    </script>
</body>
</html>
